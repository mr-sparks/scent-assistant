set_schedule:
  name: Set Schedule
  description: Set the spray schedule for a scent diffuser. Configure which days, time range, and spray/pause durations.
  fields:
    days:
      name: Days
      description: "List of weekdays: mon, tue, wed, thu, fri, sat, sun, or all"
      required: true
      example: "[mon, wed, fri]"
      selector:
        select:
          multiple: true
          options:
            - label: "Monday"
              value: "mon"
            - label: "Tuesday"
              value: "tue"
            - label: "Wednesday"
              value: "wed"
            - label: "Thursday"
              value: "thu"
            - label: "Friday"
              value: "fri"
            - label: "Saturday"
              value: "sat"
            - label: "Sunday"
              value: "sun"
            - label: "All days"
              value: "all"
    start_time:
      name: Start Time
      description: "Time to start spraying (HH:MM)"
      required: false
      default: "00:00"
      example: "08:00"
      selector:
        time:
    end_time:
      name: End Time
      description: "Time to stop spraying (HH:MM)"
      required: false
      default: "23:59"
      example: "20:00"
      selector:
        time:
    work_seconds:
      name: Work Duration (seconds)
      description: "How long each spray lasts in seconds"
      required: false
      default: 10
      example: 15
      selector:
        number:
          min: 5
          max: 600
          unit_of_measurement: seconds
    pause_seconds:
      name: Pause Duration (seconds)
      description: "Pause between sprays in seconds"
      required: false
      default: 120
      example: 60
      selector:
        number:
          min: 5
          max: 3600
          unit_of_measurement: seconds
    enabled:
      name: Enabled
      description: "Enable or disable this schedule slot"
      required: false
      default: true
      selector:
        boolean:
